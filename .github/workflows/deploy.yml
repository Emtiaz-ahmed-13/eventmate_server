name: Server CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build server
        run: npm run build

  deploy:
    name: Deploy server to EC2
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || '/home/ubuntu/eventmate' }}
      RUN_SEED: ${{ secrets.RUN_SEED || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/eventmate_ec2_key
          chmod 600 ~/.ssh/eventmate_ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync server code
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/eventmate_ec2_key" \
            --exclude ".env" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "generated" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${EC2_APP_DIR}/eventmate_server/"

      - name: Rebuild and restart server
        run: |
          ssh -i ~/.ssh/eventmate_ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_APP_DIR='${EC2_APP_DIR}' RUN_SEED='${RUN_SEED}' bash -s" <<'EOF'
          set -e
          cd "${EC2_APP_DIR:-/home/ubuntu/eventmate}"
          docker compose -f docker-compose.prod.yml build server
          docker compose -f docker-compose.prod.yml up -d server nginx
          if [ "${RUN_SEED:-false}" = "true" ]; then
            docker compose -f docker-compose.prod.yml exec -T server npx tsx prisma/seed.ts
          fi
          docker compose -f docker-compose.prod.yml ps
          EOF
