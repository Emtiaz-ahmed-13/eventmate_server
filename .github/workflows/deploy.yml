name: Server CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ci:ci@localhost:5432/eventmate_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/eventmate_ci
      JWT_SECRET: ci-test-jwt-secret-key-32chars
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_TOKEN_SECRET: ci-test-refresh-secret-key-32
      JWT_REFRESH_TOKEN_EXPIRES_IN: 30d
      JWT_RESET_PASS_TOKEN: ci-test-reset-secret-key-32chars
      JWT_RESET_PASS_TOKEN_EXPIRES_IN: 10m
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      IMAGEKIT_PUBLIC_KEY: public_ci_placeholder
      IMAGEKIT_PRIVATE_KEY: private_ci_placeholder
      IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/ci
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: "587"
      EMAIL_USER: ci@example.com
      EMAIL_PASS: ci-placeholder
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build server
        run: npm run build

      - name: Run tests
        run: npm run test:run

  # Optional EC2 deploy — only when repository variable EC2_DEPLOY=true is set.
  # Production deploy on Render is handled separately via Render auto-deploy.
  deploy:
    name: Deploy server to EC2
    needs: [build]
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.EC2_DEPLOY == 'true'
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      RUN_SEED: ${{ secrets.RUN_SEED }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          missing=0
          for name in EC2_HOST EC2_USER EC2_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Secret $name is not set in this repository"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/eventmate_ec2_key
          chmod 600 ~/.ssh/eventmate_ec2_key
          ssh-keygen -y -f ~/.ssh/eventmate_ec2_key > /dev/null
          ssh-keyscan -T 15 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          set -euo pipefail
          APP_DIR="${EC2_APP_DIR:-/home/ubuntu/eventmate}"
          ssh -i ~/.ssh/eventmate_ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            "${EC2_USER}@${EC2_HOST}" "echo SSH OK && test -d '${APP_DIR}'"

      - name: Sync server code
        run: |
          set -euo pipefail
          APP_DIR="${EC2_APP_DIR:-/home/ubuntu/eventmate}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/eventmate_ec2_key -o StrictHostKeyChecking=no" \
            --exclude ".env" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "generated" \
            ./ "${EC2_USER}@${EC2_HOST}:${APP_DIR}/eventmate_server/"

      - name: Rebuild and restart server
        run: |
          set -euo pipefail
          APP_DIR="${EC2_APP_DIR:-/home/ubuntu/eventmate}"
          RUN_SEED_FLAG="${RUN_SEED:-false}"
          ssh -i ~/.ssh/eventmate_ec2_key \
            -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" \
            "EC2_APP_DIR='${APP_DIR}' RUN_SEED='${RUN_SEED_FLAG}' bash -s" <<'EOF'
          set -e
          cd "${EC2_APP_DIR:-/home/ubuntu/eventmate}"
          docker compose -f docker-compose.prod.yml build server
          docker compose -f docker-compose.prod.yml up -d server nginx
          if [ "${RUN_SEED:-false}" = "true" ]; then
            docker compose -f docker-compose.prod.yml exec -T server npx tsx prisma/seed.ts
          fi
          docker compose -f docker-compose.prod.yml ps
          EOF
